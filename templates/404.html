<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Halaman Tidak Ditemukan | {{ profile.nama }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .error-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), #a78bfa, var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.05em;
            animation: floatCode 4s ease-in-out infinite;
        }

        @keyframes floatCode {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .error-emoji {
            font-size: 3rem;
            margin: 1rem 0;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .error-msg {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 400px;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .error-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .error-blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(108, 99, 255, 0.12), transparent 70%);
            top: -100px;
            left: -100px;
        }

        .error-blob-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 138, 0.08), transparent 70%);
            bottom: -80px;
            right: 10%;
        }

        .error-code-snippet {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            font-family: var(--font-code);
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            text-align: left;
        }

        .error-code-snippet .c-keyword {
            color: #ff79c6;
        }

        .error-code-snippet .c-string {
            color: #f1fa8c;
        }

        .error-code-snippet .c-num {
            color: #bd93f9;
        }
    </style>
</head>

<body>
    <!-- ─── Custom Cursor ──────────────────────────────────────────────────────── -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>
    <div class="scroll-progress" id="scroll-progress"></div>
    <div class="error-page">
        <div class="error-bg">
            <div class="grid-overlay"></div>
            <div class="error-blob error-blob-1"></div>
            <div class="error-blob error-blob-2"></div>
        </div>

        <div class="error-code">{{ code if code is defined else '404' }}</div>
        <div class="error-emoji">🔍</div>
        <h1 class="error-title">Halaman Tidak Ditemukan</h1>
        <p class="error-msg">
            Lo nyasar bro! Halaman yang lo cari tidak ada atau sudah dipindah.
            Tenang, balik ke home aja.
        </p>

        <div class="error-code-snippet">
            <span class="c-keyword">raise</span> NotFound(
            <span class="c-string">"halaman ini belum exist"</span>,
            code=<span class="c-num">{{ code if code is defined else '404' }}</span>
            )
        </div>

        <div class="error-actions">
            <a href="{{ url_for('home') }}" class="btn btn-primary">← Balik ke Home</a>
            <a href="{{ url_for('blog') }}" class="btn btn-secondary">Baca Blog</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
