<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | {{ profile.nama }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
            box-shadow: var(--shadow);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo-text {
            font-family: var(--font-code);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .login-error {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: var(--red);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }
    </style>
</head>

<body>
    <!-- ─── Custom Cursor ──────────────────────────────────────────────────────── -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-text">
                    <span class="logo-bracket">&lt;</span>Admin<span class="logo-bracket">/&gt;</span>
                </div>
                <div class="login-subtitle">Dashboard Panel</div>
            </div>
            {% if error %}
            <div class="login-error">⚠️ {{ error }}</div>
            {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label for="password">Password Admin</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password..." required
                        autofocus>
                </div>
                <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem;">
                    🔐 Masuk
                </button>
            </form>
            <div style="text-align:center; margin-top:1.5rem;">
                <a href="{{ url_for('home') }}" style="font-size:0.82rem; color:var(--text-muted);">← Balik ke
                    Portfolio</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
